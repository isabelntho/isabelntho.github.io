career-profile:
    title: Career Profile
    summary: |
      I am a final-year master’s student in Environmental Science with 2+ years’ experience 
      as a geospatial analyst at the UK Centre for Ecology and Hydrology. I’m a creative, 
      adaptable team player who is passionate about harnessing geospatial data to streamline 
      environmental monitoring insights. I am highly proficient in GIS, geospatial programming 
      and processing satellite data and I am constantly looking to develop my technical skills. 
education:
    title: Education
    info:
      - degree: MSc in Environmental Science
        university: University of Geneva
        time: 2020 - 2022
        details: |
          Climate change impacts, ecosystem services, remote sensing, machine learning, GIS
      - degree: BSc in Geography
        university: University College London
        time: 2014 - 2017
        details: |
          
experiences:
    title: Experiences
    info:
      - role: Quantitative Analyst Intern
        time: Jun - Aug 2022
        company: United Nations Environment Programme, Geneva
        details: |
          I completed an internship supporting the development of Strata, a climate
          security analytics platform (unepstrata.org)
      - role: Spatial Data Analyst
        time: 2018 - 2020
        company: UK Centre for Ecology & Hydrology, Edinburgh, UK
        details: |
          I developed tools and workflows for the automated processing and 
          analysis of air quality data, produced outputs for research reports
          and proposals. My work contributed to products at all stages of air
          quality networks, from the design of spatial monitoring networks to the
          analysis of atmospheric dispersion model results under different
          mitigation strategies

